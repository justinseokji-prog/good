<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기상 모니터링</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .dropdowns {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        select {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            border-left: 10px solid black;
            border-bottom: 2px solid black;
            padding-left: 10px;
            margin-bottom: 15px;
            display: inline-block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid black;
            font-size: 18px;
            text-align: center;
        }

        th,
        td {
            border: 1px solid black;
            padding: 12px;
            font-weight: bold;
        }

        .bg-gray {
            background-color: #f0f0f0;
        }

        .wind-table td:first-child {
            background-color: #f0f0f0;
        }

        .forecast-table th {
            background-color: #f0f0f0;
        }

        .forecast-table td:first-child {
            background-color: #f0f0f0;
        }

        .blue-text {
            color: #2c7bb6;
        }

        .red-text {
            color: #d7191c;
        }

        .btn-capture {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #3d8bcd;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-capture:hover {
            background-color: #2b6fa6;
        }

        /* Weather Icon Sizes */
        .icon-large {
            font-size: 30px;
        }

        /* Wind cell */
        .wind-cell {
            line-height: 1.4;
        }

        /* Alert Section */
        .alert-section {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .alert-card {
            flex: 1;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            border-left: 5px solid #ccc;
        }

        .alert-card.work-stop {
            border-left-color: #d7191c;
        }

        .alert-card.health {
            border-left-color: #2c7bb6;
        }

        .alert-card.advisory {
            border-left-color: #8e44ad;
        }

        .alert-card h3 {
            margin-top: 0;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-item {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .status-danger {
            color: #d7191c;
            font-weight: bold;
        }

        .status-warning {
            color: #f59e0b;
            font-weight: bold;
        }

        .status-safe {
            color: #10b981;
            font-weight: bold;
        }

        .btn-law {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            transition: 0.2s;
        }

        .btn-law:hover {
            background-color: #e0e0e0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .close {
            color: #aaa;
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .law-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            margin-top: 15px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #eee;
            white-space: pre-line;
            max-height: 60vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="dropdowns" id="dropdowns">
            <!-- Dropdowns will be populated by regions.js data conceptually -->
            <select id="region1">
                <option>서울특별시</option>
            </select>
            <select id="region2">
                <option>종로구</option>
            </select>
            <select id="region3">
                <option>사직동</option>
            </select>
        </div>

        <!-- 풍속현황 -->
        <div>
            <div class="title">풍속현황</div>
            <table class="wind-table">
                <tr>
                    <td width="20%">시간</td>
                    <td width="80%" id="w-time">09시</td>
                </tr>
                <tr>
                    <td>순간<br>풍속</td>
                    <td id="w-max">5.8m/s</td>
                </tr>
                <tr>
                    <td>평균<br>풍속</td>
                    <td id="w-avg">4.0m/s</td>
                </tr>
                <tr>
                    <td>비고</td>
                    <td id="w-note">초미세먼지 좋음</td>
                </tr>
            </table>
        </div>

        <!-- 산업안전보건법 알리미 -->
        <div class="alert-section" id="alert-section">
            <div class="alert-card advisory">
                <h3><span class="icon">🚨</span> 기상특보 (예상) 알림</h3>
                <div class="alert-content">
                    <div class="status-item" id="alert-advisory-wind">강풍특보: <strong>-</strong></div>
                    <div class="status-item" id="alert-advisory-rain">호우특보: <strong>-</strong></div>
                    <div class="status-item" id="alert-advisory-snow">대설특보: <strong>-</strong></div>
                    <div class="status-item" id="alert-advisory-heat">폭염특보: <strong>-</strong></div>
                </div>
                <button class="btn-law" onclick="showLaw('advisory')">발령 기준 보기</button>
            </div>

            <div class="alert-card work-stop">
                <h3><span class="icon">🚧</span> 기상에 따른 작업 중지 알림</h3>
                <div class="alert-content">
                    <div class="status-item" id="alert-wind">풍속: <strong>-</strong></div>
                    <div class="status-item" id="alert-rain">강수량: <strong>-</strong></div>
                    <div class="status-item" id="alert-snow">적설량: <strong>-</strong></div>
                </div>
                <button class="btn-law" onclick="showLaw('work')">관련 법령 보기</button>
            </div>

            <div class="alert-card health">
                <h3><span class="icon">😷</span> 보건(황사·미세먼지) 알림</h3>
                <div class="alert-content">
                    <div class="status-item" id="alert-dust10">미세먼지(PM10): <strong>-</strong></div>
                    <div class="status-item" id="alert-dust25">초미세먼지(PM2.5): <strong>-</strong></div>
                    <div class="status-item" id="alert-mask">권고사항: <strong>-</strong></div>
                </div>
                <button class="btn-law" onclick="showLaw('health')">관련 법령 보기</button>
            </div>
        </div>

        <!-- 일기예보 영역 (캡처 대상) -->
        <div id="forecast-section" style="background-color: white; padding: 10px;">
            <div style="display: flex; align-items: baseline; margin-bottom: 10px;">
                <div class="title" style="margin-bottom:0; flex-shrink: 0;">일기예보</div>
            </div>

            <table class="forecast-table">
                <thead>
                    <tr id="date-row">
                        <th width="10%">날짜</th>
                    </tr>
                    <tr>
                        <th width="10%">시각</th>
                        <th width="15%">오전</th>
                        <th width="15%">오후</th>
                        <th width="15%">오전</th>
                        <th width="15%">오후</th>
                        <th width="15%">오전</th>
                        <th width="15%">오후</th>
                    </tr>
                </thead>
                <tbody id="forecast-body">
                    <!-- Data will be inserted here -->
                </tbody>
            </table>
            <div id="base-time" style="font-size: 14px; color: #555555; margin-top: 5px;">업데이트 기준: -</div>
        </div>

        <button class="btn-capture" onclick="captureForecast()">일기예보 스크린샷</button>
    </div>

    <!-- 법령 모달 -->
    <div id="law-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLaw()">&times;</span>
            <h2 id="law-title" style="margin-top: 0;">법령 정보</h2>
            <div id="law-text" class="law-text"></div>
        </div>
    </div>

    <script src="regions.js"></script>
    <script>
        const KMA_API_KEY = "a50769958abbb8124ed0f48bdd5cb0841bbf509a1a2a5d741f8e35e56dc5f7c1";
        const AIR_API_KEY = "9f84be7b8da01571f296c24da19af99137e883b3a55546affe686c7b992ae819";

        function getWindStrength(wsd) {
            if (wsd >= 10) return '강';
            if (wsd >= 4) return '약간 강';
            return '약';
        }

        function getWindDir(vec) {
            // html2canvas가 SVG와 CSS transform을 제대로 캡처하지 못하는 문제를 해결하기 위해
            // SVG 내부에 transform을 적용한 후 base64 이미지 데이터로 변환하여 렌더링합니다.
            const angle = (vec + 180) % 360;
            const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"><g transform="rotate(${angle} 12 12)"><path fill="#000000" d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" /></g></svg>`;
            const encoded = "data:image/svg+xml;base64," + btoa(svgString);
            return `<img src="${encoded}" style="width:28px; height:28px; display: block; margin: 0 auto;" />`;
        }

        function getWeatherIcon(sky, pty) {
            if (pty == 1 || pty == 4) return '☔';
            if (pty == 2 || pty == 3) return '❄️';
            if (sky == 1) return '☀️';
            if (sky == 3) return '⛅';
            return '☁️';
        }

        const lawData = {
            advisory: {
                title: "[기상청] 기상특보 발령 기준",
                text: "1. 강풍주의보: 육상에서 풍속 14m/s 이상 또는 순간풍속 20m/s 이상이 예상될 때\n2. 호우주의보: 3시간 강우량이 60mm 이상 예상되거나 12시간 강우량이 110mm 이상 예상될 때\n3. 대설주의보: 24시간 신적설이 5cm 이상 예상될 때\n4. 폭염주의보: 최고기온이 33℃ 이상인 상태가 2일 이상 지속될 것으로 예상될 때\n\n* 본 알림은 예보 데이터를 바탕으로 한 '예상 특보'이며 실제 기상청 특보 발령과 차이가 있을 수 있습니다."
            },
            work: {
                title: "[산업안전보건기준에 관한 규칙] 작업 중지 기준",
                text: "제37조(악천후 및 강풍 시의 작업 중지)\n① 사업주는 순간풍속이 초당 10미터를 초과하는 경우 타워크레인의 설치·수리·점검 또는 해체 작업을 중지하여야 한다.\n② 사업주는 순간풍속이 초당 15미터를 초과하는 경우 타워크레인의 운전작업을 중지하여야 한다.\n\n제44조(추락의 방지)\n사업주는 높이가 2미터 이상인 장소에서 비, 눈, 그 밖의 기상불안정으로 날씨가 몹시 나빠서(풍속 10m/s 이상, 강우량 1mm/h 이상, 강설량 1cm/h 이상) 근로자가 추락할 위험이 있는 경우에는 해당 작업을 중지하여야 한다.\n\n제383조(작업의 제한)\n사업주는 강풍(10m/s 이상), 폭우(1mm/h 이상), 폭설(1cm/h 이상) 등의 악천후로 인하여 근로자가 위험해질 우려가 있는 경우 철골작업을 중지하여야 한다."
            },
            health: {
                title: "[산업안전보건기준] 황사·미세먼지 대응 가이드",
                text: "제617조(작업환경의 관리)\n사업주는 황사, 미세먼지(PM10) 및 초미세먼지(PM2.5) 주의보·경보 발령 시 옥외작업 근로자의 건강장해를 예방하기 위하여 호흡기 보호구(방진마스크)를 지급하고 착용하도록 하여야 한다.\n\n<황사 및 미세먼지 주의보/경보 시 사업장 대응 조치>\n1. 주의보 발령 시\n (미세먼지 150㎍/㎥ 이상, 초미세먼지 75㎍/㎥ 이상 2시간 지속)\n - 옥외 근로자에게 마스크 지급 및 착용 권고\n - 민감군 근로자의 옥외작업 단축 또는 휴식시간 추가 부여\n\n2. 경보 발령 시\n (미세먼지 300㎍/㎥ 이상, 초미세먼지 150㎍/㎥ 이상 2시간 지속, 황사경보 등)\n - 호흡용 보호구(마스크) 지급 및 착용 의무화\n - 불가피한 경우 제외 옥외작업 중지 또는 작업시간 단축"
            }
        };

        function showLaw(type) {
            document.getElementById('law-title').innerText = lawData[type].title;
            document.getElementById('law-text').innerText = lawData[type].text;
            document.getElementById('law-modal').style.display = 'block';
        }

        function closeLaw() {
            document.getElementById('law-modal').style.display = 'none';
        }

        window.onclick = function (event) {
            const modal = document.getElementById('law-modal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        const cbRegion1 = document.getElementById('region1');
        const cbRegion2 = document.getElementById('region2');
        const cbRegion3 = document.getElementById('region3');

        function initRegions() {
            cbRegion1.innerHTML = '';
            for (let r1 in REGIONS) {
                cbRegion1.innerHTML += `<option value="${r1}">${r1}</option>`;
            }
            cbRegion1.value = "서울특별시";
            updateRegion2();
        }

        function updateRegion2() {
            const r1 = cbRegion1.value;
            cbRegion2.innerHTML = '';
            if (REGIONS[r1]) {
                for (let r2 in REGIONS[r1]) {
                    cbRegion2.innerHTML += `<option value="${r2}">${r2}</option>`;
                }
            }
            if (r1 === "서울특별시") cbRegion2.value = "송파구";
            updateRegion3();
        }

        function updateRegion3() {
            const r1 = cbRegion1.value;
            const r2 = cbRegion2.value;
            cbRegion3.innerHTML = '';
            if (REGIONS[r1] && REGIONS[r1][r2]) {
                const d_list = REGIONS[r1][r2].d || [];
                for (let r3 of d_list) {
                    cbRegion3.innerHTML += `<option value="${r3}">${r3}</option>`;
                }
            }
            if (r1 === "서울특별시" && r2 === "송파구") cbRegion3.value = "장지동";
            fetchData();
        }

        cbRegion1.addEventListener('change', updateRegion2);
        cbRegion2.addEventListener('change', updateRegion3);
        cbRegion3.addEventListener('change', fetchData);

        async function fetchData() {
            const r1 = cbRegion1.value;
            const r2 = cbRegion2.value;
            let nx = 62, ny = 126, st = "송파구";

            if (REGIONS[r1] && REGIONS[r1][r2]) {
                nx = REGIONS[r1][r2].nx;
                ny = REGIONS[r1][r2].ny;
                st = REGIONS[r1][r2].st;
            }

            // Date Setup
            const now = new Date();
            const dateRow = document.getElementById('date-row');
            dateRow.innerHTML = '<th width="10%">날짜</th>';

            const hanjaDays = ['日', '月', '火', '水', '木', '金', '土'];
            const targetDates = [];

            for (let i = 0; i < 3; i++) {
                const d = new Date(now);
                d.setDate(now.getDate() + i);
                targetDates.push(d);
                const dateStr = `${String(d.getFullYear()).slice(2)}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} (${hanjaDays[d.getDay()]})`;

                const th = document.createElement('th');
                th.colSpan = 2;
                th.innerText = dateStr;

                if (d.getDay() === 6) th.style.color = '#2c7bb6';
                if (d.getDay() === 0) th.style.color = '#d7191c';
                dateRow.appendChild(th);
            }

            // Air Quality
            let pm25Status = "보통";
            let pm10Status = "보통";
            let pm25Val = 0;
            let pm10Val = 0;
            let maskRec = "필요시 착용";
            let maskClass = "status-safe";

            try {
                const airUrl = `https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${AIR_API_KEY}&returnType=json&numOfRows=1&pageNo=1&stationName=${encodeURIComponent(st)}&dataTerm=DAILY&ver=1.0`;
                const res = await fetch(airUrl);
                const data = await res.json();
                pm25Val = parseInt(data.response.body.items[0].pm25Value) || 0;
                pm10Val = parseInt(data.response.body.items[0].pm10Value) || 0;

                // PM10 (미세먼지 / 황사)
                if (pm10Val >= 300) pm10Status = "미세먼지/황사 경보 수준";
                else if (pm10Val >= 150) pm10Status = "주의보 수준";
                else if (pm10Val >= 81) pm10Status = "나쁨";
                else if (pm10Val >= 31) pm10Status = "보통";
                else pm10Status = "좋음";

                // PM2.5 (초미세먼지)
                if (pm25Val >= 150) pm25Status = "경보 수준";
                else if (pm25Val >= 75) pm25Status = "주의보 수준";
                else if (pm25Val >= 35) pm25Status = "나쁨";
                else if (pm25Val >= 15) pm25Status = "보통";
                else pm25Status = "좋음";

                // 종합 마스크 착용 권고사항
                if (pm25Val >= 150 || pm10Val >= 300) {
                    maskRec = "마스크 지급 및 착용 의무화 (옥외작업 단축/중지)";
                    maskClass = "status-danger";
                } else if (pm25Val >= 75 || pm10Val >= 150) {
                    maskRec = "마스크 지급 및 착용 권고 (민감군 옥외작업 단축)";
                    maskClass = "status-warning";
                } else if (pm25Val >= 35 || pm10Val >= 81) {
                    maskRec = "민감군 마스크 착용 권고";
                    maskClass = "status-warning";
                } else {
                    maskRec = "마스크 자율 착용";
                    maskClass = "status-safe";
                }
            } catch (e) { console.error("Air API Error", e); }

            document.getElementById('alert-dust10').innerHTML = `미세먼지(PM10): <strong>${pm10Val}㎍/㎥ (${pm10Status})</strong>`;
            document.getElementById('alert-dust25').innerHTML = `초미세먼지(PM2.5): <strong>${pm25Val}㎍/㎥ (${pm25Status})</strong>`;
            document.getElementById('alert-mask').innerHTML = `권고사항: <strong class="${maskClass}">${maskRec}</strong>`;

            // Weather API
            const yest = new Date(now);
            yest.setDate(now.getDate() - 1);
            const base_date = `${yest.getFullYear()}${String(yest.getMonth() + 1).padStart(2, '0')}${String(yest.getDate()).padStart(2, '0')}`;
            const base_time = "2300";

            document.getElementById('base-time').innerText = `업데이트 기준: ${yest.getFullYear()}년 ${yest.getMonth() + 1}월 ${yest.getDate()}일 23:00 발표 (오전 08:00, 오후 14:00 예보 기준)`;

            let forecast = {};
            let maxWsd = 0;
            let maxRain = 0;
            let maxSnow = 0;
            let maxTmp = 0;

            try {
                const kmaUrl = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${KMA_API_KEY}&numOfRows=1000&pageNo=1&dataType=JSON&base_date=${base_date}&base_time=${base_time}&nx=${nx}&ny=${ny}`;
                const res = await fetch(kmaUrl);
                const data = await res.json();
                const items = data.response.body.items.item;

                items.forEach(item => {
                    const fDate = item.fcstDate;
                    const fTime = item.fcstTime;
                    if (!forecast[fDate]) forecast[fDate] = {};
                    if (!forecast[fDate][fTime]) forecast[fDate][fTime] = {};
                    forecast[fDate][fTime][item.category] = item.fcstValue;

                    if (item.category === 'WSD') {
                        const val = parseFloat(item.fcstValue);
                        if (val > maxWsd) maxWsd = val;
                    }
                    if (item.category === 'PCP' && item.fcstValue !== '강수없음') {
                        const val = parseFloat(item.fcstValue.replace(/[^0-9.]/g, ''));
                        if (val > maxRain) maxRain = val;
                    }
                    if (item.category === 'SNO' && item.fcstValue !== '적설없음') {
                        const val = parseFloat(item.fcstValue.replace(/[^0-9.]/g, ''));
                        if (val > maxSnow) maxSnow = val;
                    }
                    if (item.category === 'TMX') {
                        const val = parseFloat(item.fcstValue);
                        if (val > maxTmp) maxTmp = val;
                    }
                });
            } catch (e) { console.error("KMA API Error", e); }

            // Special Weather Advisory Check
            let advWind = maxWsd >= 14 ? '<strong class="status-danger">발령 수준 (14m/s 이상)</strong>' : '<span class="status-safe">안전</span>';
            let advRain = maxRain >= 30 ? '<strong class="status-danger">발령 수준 (예상)</strong>' : '<span class="status-safe">안전</span>'; // Simple estimation
            let advSnow = maxSnow >= 5 ? '<strong class="status-danger">발령 수준 (5cm 이상)</strong>' : '<span class="status-safe">안전</span>';
            let advHeat = maxTmp >= 33 ? '<strong class="status-danger">발령 수준 (33℃ 이상)</strong>' : '<span class="status-safe">안전</span>';

            document.getElementById('alert-advisory-wind').innerHTML = `강풍특보: ${advWind}`;
            document.getElementById('alert-advisory-rain').innerHTML = `호우특보: ${advRain}`;
            document.getElementById('alert-advisory-snow').innerHTML = `대설특보: ${advSnow}`;
            document.getElementById('alert-advisory-heat').innerHTML = `폭염특보: ${advHeat}`;

            const todayDateStr = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
            const currentHour = String(now.getHours()).padStart(2, '0') + "00";

            let currentWsd = 5.8;
            let currentRain = "강수없음";
            let currentSnow = "적설없음";

            if (forecast[todayDateStr] && forecast[todayDateStr][currentHour]) {
                currentWsd = parseFloat(forecast[todayDateStr][currentHour]['WSD'] || 5.8);
                currentRain = forecast[todayDateStr][currentHour]['PCP'] || "강수없음";
                currentSnow = forecast[todayDateStr][currentHour]['SNO'] || "적설없음";
            }

            document.getElementById('w-time').innerText = String(now.getHours()).padStart(2, '0') + "시";
            document.getElementById('w-max').innerText = `${currentWsd.toFixed(1)}m/s`;
            document.getElementById('w-avg').innerText = `${(currentWsd * 0.7).toFixed(1)}m/s`;
            document.getElementById('w-note').innerText = pm25Status;

            // Update Work Stop Alert
            let wClass = "status-safe";
            let wText = `${currentWsd.toFixed(1)}m/s (정상)`;
            if (currentWsd >= 15) { wClass = "status-danger"; wText = `${currentWsd.toFixed(1)}m/s (타워크레인 운전 중지)`; }
            else if (currentWsd >= 10) { wClass = "status-danger"; wText = `${currentWsd.toFixed(1)}m/s (고소작업/타워크레인 설치·해체 중지)`; }

            let rClass = "status-safe";
            let rText = `${currentRain} (정상)`;
            if (currentRain !== "강수없음" && parseFloat(currentRain.replace(/[^0-9.]/g, '')) >= 1) {
                rClass = "status-danger"; rText = `${currentRain} (고소작업/철골작업 중지)`;
            }

            let sClass = "status-safe";
            let sText = `${currentSnow} (정상)`;
            if (currentSnow !== "적설없음" && parseFloat(currentSnow.replace(/[^0-9.]/g, '')) >= 1) {
                sClass = "status-danger"; sText = `${currentSnow} (고소작업/철골작업 중지)`;
            }

            document.getElementById('alert-wind').innerHTML = `풍속: <strong class="${wClass}">${wText}</strong>`;
            document.getElementById('alert-rain').innerHTML = `강수량: <strong class="${rClass}">${rText}</strong>`;
            document.getElementById('alert-snow').innerHTML = `적설량: <strong class="${sClass}">${sText}</strong>`;

            let html = "";
            const rows = ['날 씨', '기 온', '강수<br>확률', '바람<br>(m/s)'];
            const tableData = [];

            for (let i = 0; i < 3; i++) {
                const fDateStr = `${targetDates[i].getFullYear()}${String(targetDates[i].getMonth() + 1).padStart(2, '0')}${String(targetDates[i].getDate()).padStart(2, '0')}`;
                for (const tTime of ['0800', '1400']) {
                    let pop = 0, wsd = 5.0, vec = 0, sky = 1, pty = 0, tmp = "10";
                    if (forecast[fDateStr] && forecast[fDateStr][tTime]) {
                        const ft = forecast[fDateStr][tTime];
                        pop = parseInt(ft['POP'] || 0);
                        wsd = parseFloat(ft['WSD'] || 0);
                        vec = parseFloat(ft['VEC'] || 0);
                        sky = parseInt(ft['SKY'] || 1);
                        pty = parseInt(ft['PTY'] || 0);
                        tmp = ft['TMP'] || "0";
                    }
                    tableData.push({
                        icon: getWeatherIcon(sky, pty),
                        temp: tmp,
                        pop: pop,
                        wsd: wsd,
                        wStr: getWindStrength(wsd),
                        arrowSVG: getWindDir(vec)
                    });
                }
            }

            html += `<tr><td>${rows[0]}</td>` + tableData.map(d => `<td class="icon-large">${d.icon}</td>`).join('') + `</tr>`;
            html += `<tr><td>${rows[1]}</td>` + tableData.map((d, i) => `<td class="${i % 2 === 0 ? 'blue-text' : 'red-text'}">${d.temp}°C</td>`).join('') + `</tr>`;
            html += `<tr><td>${rows[2]}</td>` + tableData.map(d => `<td>${d.pop > 0 ? d.pop + '%' : '-'}</td>`).join('') + `</tr>`;
            html += `<tr><td>${rows[3]}</td>` + tableData.map(d => `<td class="wind-cell">${d.arrowSVG}<div style="margin-top:4px;">${d.wStr}<br>${parseFloat(d.wsd).toFixed(1)}m/s</div></td>`).join('') + `</tr>`;

            document.getElementById('forecast-body').innerHTML = html;
        }

        async function captureForecast() {
            const target = document.getElementById('forecast-section');
            const canvas = await html2canvas(target, { backgroundColor: '#ffffff', scale: 2 });
            const url = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = url;
            a.download = 'forecast_screenshot.png';
            a.click();
        }

        window.onload = initRegions;
    </script>
</body>

</html>
